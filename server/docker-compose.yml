# Backend API only. No .env file: set env vars in Dokploy (or host) and they
# are passed into the container. See .env.example for names and descriptions.
# Run from server dir: docker compose up -d

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL
      - JWT_ACCESS_SECRET
      - JWT_REFRESH_SECRET
      - JWT_ACCESS_EXPIRY
      - JWT_REFRESH_EXPIRY
      - FRONTEND_URL
      - BACKEND_URL
      - APP_DEEP_LINK_SCHEME
      - GOOGLE_CLIENT_ID
      - GOOGLE_CLIENT_SECRET
      - SMTP_HOST
      - SMTP_PORT
      - SMTP_SECURE
      - SMTP_USER
      - SMTP_PASS
      - SMTP_FROM
      - SUBSCRIPTION_REMINDER_INTERVAL_DAYS
      - EMAIL_UNSUBSCRIBE_SECRET
      - PADDLE_API_KEY
      - PADDLE_WEBHOOK_SECRET
      - PADDLE_PRICE_ID_BASIC
      - PADDLE_PRICE_ID_PRO
      - R2_ACCOUNT_ID
      - R2_ACCESS_KEY_ID
      - R2_SECRET_ACCESS_KEY
      - R2_BUCKET
      - R2_PUBLIC_URL
      - PORT
      - NODE_ENV
    ports:
      - "3000:3000"
    restart: unless-stopped
