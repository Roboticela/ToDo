name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0, v1.2.3, etc.
  workflow_dispatch:  # Allows manual triggering
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0) - leave empty for test release'
        required: false
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

# Opt into Node.js 24 for JavaScript actions (Node 20 is deprecated on GitHub-hosted runners)
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build for ${{ matrix.platform }}
    runs-on: ${{ matrix.runs-on }}
    env:
      VITE_API_URL: https://api.todo.roboticela.com
    strategy:
      fail-fast: false
      matrix:
        include:
          # Windows builds (Tauri v2: use config file for bundle type; npm run tauri build -- ... so args reach tauri)
          - platform: windows-x64
            runs-on: windows-latest
            artifact-name: ToDo-setup.exe
            build-target: x86_64-pc-windows-msvc
            bundle-target: nsis
            build-command: npm run tauri build -- -c src-tauri/tauri.windows-bundle.json --target x86_64-pc-windows-msvc
            artifact-path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/Roboticela ToDo_*.exe
            
          - platform: windows-x64-msi
            runs-on: windows-latest
            artifact-name: ToDo-setup.msi
            build-target: x86_64-pc-windows-msvc
            bundle-target: msi
            build-command: npm run tauri build -- -c src-tauri/tauri.windows-bundle.json --target x86_64-pc-windows-msvc
            artifact-path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/Roboticela ToDo_*.msi
            
          - platform: windows-aarch64
            runs-on: windows-latest
            artifact-name: ToDo-setup-arm64.exe
            build-target: aarch64-pc-windows-msvc
            bundle-target: nsis
            build-command: npm run tauri build -- -c src-tauri/tauri.windows-bundle.json --target aarch64-pc-windows-msvc
            artifact-path: src-tauri/target/aarch64-pc-windows-msvc/release/bundle/nsis/Roboticela ToDo_*.exe
            
          - platform: windows-i686
            runs-on: windows-latest
            artifact-name: ToDo-setup-x86.exe
            build-target: i686-pc-windows-msvc
            bundle-target: nsis
            build-command: npm run tauri build -- -c src-tauri/tauri.windows-bundle.json --target i686-pc-windows-msvc
            artifact-path: src-tauri/target/i686-pc-windows-msvc/release/bundle/nsis/Roboticela ToDo_*.exe
            
          # Linux builds (use -- so npm passes --bundles/--target to tauri)
          - platform: linux-x64-appimage
            runs-on: ubuntu-latest
            artifact-name: ToDo.AppImage
            build-command: npm run tauri build -- --bundles appimage --target x86_64-unknown-linux-gnu
            artifact-path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/appimage/Roboticela ToDo_*.AppImage
            
          - platform: linux-x64-deb
            runs-on: ubuntu-latest
            artifact-name: ToDo.deb
            build-command: npm run tauri build -- --bundles deb --target x86_64-unknown-linux-gnu
            artifact-path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/deb/Roboticela ToDo_*.deb
            
          - platform: linux-x64-rpm
            runs-on: ubuntu-latest
            artifact-name: ToDo.rpm
            build-command: npm run tauri build -- --bundles rpm --target x86_64-unknown-linux-gnu
            artifact-path: src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/rpm/Roboticela ToDo_*.rpm
            
          # macOS builds (use -- so npm passes --bundles/--target to tauri)
          - platform: macos-x64
            runs-on: macos-latest
            artifact-name: ToDo.dmg
            build-command: npm run tauri build -- --bundles dmg --target x86_64-apple-darwin
            artifact-path: src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/Roboticela ToDo_*.dmg
            
          - platform: macos-arm64
            runs-on: macos-latest
            artifact-name: ToDo-arm64.dmg
            build-command: npm run tauri build -- --bundles dmg --target aarch64-apple-darwin
            artifact-path: src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/Roboticela ToDo_*.dmg
            
          - platform: macos-x64-app
            runs-on: macos-latest
            artifact-name: ToDo.app.tar.gz
            build-command: npm run tauri build -- --bundles app --target x86_64-apple-darwin && APP_BUNDLE=$(find src-tauri/target/x86_64-apple-darwin/release/bundle/macos -name "*.app" -type d | head -1) && tar -czf ToDo.app.tar.gz -C "$(dirname "$APP_BUNDLE")" "$(basename "$APP_BUNDLE")"
            artifact-path: ToDo.app.tar.gz
            
          - platform: macos-arm64-app
            runs-on: macos-latest
            artifact-name: ToDo-arm64.app.tar.gz
            build-command: npm run tauri build -- --bundles app --target aarch64-apple-darwin && APP_BUNDLE=$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -name "*.app" -type d | head -1) && tar -czf ToDo-arm64.app.tar.gz -C "$(dirname "$APP_BUNDLE")" "$(basename "$APP_BUNDLE")"
            artifact-path: ToDo-arm64.app.tar.gz
            
          - platform: macos-universal
            runs-on: macos-latest
            artifact-name: ToDo-universal.dmg
            build-command: npm run tauri build -- --bundles dmg --target universal-apple-darwin
            artifact-path: src-tauri/target/universal-apple-darwin/release/bundle/dmg/Roboticela ToDo_*.dmg
            
          # Android builds (use -- so npm passes --target/--apk to tauri)
          - platform: android-aarch64
            runs-on: ubuntu-latest
            artifact-name: ToDo-aarch64.apk
            build-command: npm run tauri android build -- --target aarch64 --apk true
            artifact-path: src-tauri/gen/android/app/build/outputs/apk/release/app-release.apk
            
          - platform: android-armv7
            runs-on: ubuntu-latest
            artifact-name: ToDo-armv7.apk
            build-command: npm run tauri android build -- --target armv7 --apk true
            artifact-path: src-tauri/gen/android/app/build/outputs/apk/release/app-release.apk
            
          - platform: android-x86_64
            runs-on: ubuntu-latest
            artifact-name: ToDo-x86_64.apk
            build-command: npm run tauri android build -- --target x86_64 --apk true
            artifact-path: src-tauri/gen/android/app/build/outputs/apk/release/app-release.apk
            
          - platform: android-i686
            runs-on: ubuntu-latest
            artifact-name: ToDo-i686.apk
            build-command: npm run tauri android build -- --target i686 --apk true
            artifact-path: src-tauri/gen/android/app/build/outputs/apk/release/app-release.apk
            
          # iOS builds (use -- so npm passes --target to tauri)
          # - platform: ios-aarch64
          #   runs-on: macos-latest
          #   artifact-name: ToDo.ipa
          #   build-command: npm run tauri ios build -- --target aarch64
          #   artifact-path: src-tauri/gen/ios/build/Build/Products/Release-iphoneos/*.ipa
          #   
          - platform: ios-simulator-aarch64
            runs-on: macos-latest
            artifact-name: ToDo-simulator.app
            build-command: npm run tauri ios build -- --target aarch64-sim
            artifact-path: src-tauri/gen/apple/build/arm64-sim/*.app
            
          - platform: ios-simulator-x86_64
            runs-on: macos-latest
            artifact-name: ToDo-simulator-x86_64.app
            build-command: npm run tauri ios build -- --target x86_64
            artifact-path: src-tauri/gen/apple/build/x86_64-sim/*.app

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Setup Rust (for Tauri)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install Rust targets
        shell: bash
        run: |
          # Install targets based on platform
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            rustup target add x86_64-pc-windows-msvc
            # Add ARM64 and i686 targets if building for those architectures
            if [[ "${{ matrix.platform }}" == *"aarch64"* ]] || [[ "${{ matrix.platform }}" == *"arm64"* ]]; then
              rustup target add aarch64-pc-windows-msvc
            fi
            if [[ "${{ matrix.platform }}" == *"i686"* ]] || [[ "${{ matrix.platform }}" == *"x86"* ]]; then
              rustup target add i686-pc-windows-msvc
            fi
          elif [[ "${{ runner.os }}" == "Linux" ]]; then
            rustup target add x86_64-unknown-linux-gnu
            # Add Android targets if building for Android
            if [[ "${{ matrix.platform }}" == *"android"* ]]; then
              rustup target add aarch64-linux-android
              rustup target add armv7-linux-androideabi
              rustup target add x86_64-linux-android
              rustup target add i686-linux-android
            fi
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            # macOS runners are Apple Silicon, install both targets
            rustup target add aarch64-apple-darwin
            rustup target add x86_64-apple-darwin
            # Add universal target if building universal binary
            if [[ "${{ matrix.platform }}" == *"universal"* ]]; then
              rustup target add universal-apple-darwin || echo "Universal target may not be available"
            fi
            # Add iOS targets if building for iOS
            if [[ "${{ matrix.platform }}" == *"ios"* ]]; then
              rustup target add aarch64-apple-ios
              rustup target add aarch64-apple-ios-sim
              rustup target add x86_64-apple-ios || echo "x86_64-apple-ios may not be available"
            fi
          fi
          echo "Installed Rust targets:"
          rustup target list --installed

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install system dependencies (macOS for Tauri)
        if: runner.os == 'macOS'
        run: |
          brew install create-dmg
          # Ensure create-dmg is available and working
          which create-dmg || echo "Warning: create-dmg not found in PATH"
          create-dmg --version || echo "Warning: create-dmg version check failed"
          # Install cross-compilation dependencies for x86_64 on Apple Silicon
          # Note: Cross-compilation from aarch64 to x86_64 on macOS is complex
          # and may require additional setup

      - name: Setup Java (for Android builds)
        if: contains(matrix.platform, 'android')
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK (for Android builds)
        if: contains(matrix.platform, 'android')
        run: |
          export ANDROID_HOME="$HOME/Android/Sdk"
          # Set ANDROID_SDK_ROOT to match ANDROID_HOME to avoid Gradle conflicts
          export ANDROID_SDK_ROOT="$ANDROID_HOME"
          export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"
          
          # Create Android SDK directory
          mkdir -p "$ANDROID_HOME"
          cd "$ANDROID_HOME"
          
          # Download command line tools (use -f to fail on HTTP errors, -L to follow redirects)
          # Minimum expected size ~50MB; smaller = likely HTML error page
          SDK_ZIP="sdk-tools.zip"
          MIN_SIZE=50000000
          for url in \
            "https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" \
            "https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip"
          do
            echo "Trying: $url"
            if curl -fL --retry 2 --retry-delay 5 -o "$SDK_ZIP" "$url" && [ -f "$SDK_ZIP" ] && [ "$(stat -c%s "$SDK_ZIP")" -ge "$MIN_SIZE" ]; then
              break
            fi
            rm -f "$SDK_ZIP"
          done
          if [ ! -f "$SDK_ZIP" ] || [ "$(stat -c%s "$SDK_ZIP")" -lt "$MIN_SIZE" ]; then
            echo "ERROR: Android SDK command line tools download failed or file too small (expected >= 50MB)"
            exit 1
          fi
          unzip -q "$SDK_ZIP" -d cmdline-tools
          rm -f "$SDK_ZIP"
          mv cmdline-tools/cmdline-tools cmdline-tools/latest || true
          
          # Accept licenses and install components
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;36.0.0" "ndk;26.1.10909125" || true
          
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          # Set ANDROID_SDK_ROOT to match ANDROID_HOME to avoid Gradle conflicts
          # Gradle requires both variables to point to the same location
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
          echo "NDK_HOME=$ANDROID_HOME/ndk/26.1.10909125" >> $GITHUB_ENV
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      - name: Setup Android release keystore (for Android builds)
        if: contains(matrix.platform, 'android')
        run: |
          KEYSTORE_DIR="$HOME/.android/keystore"
          mkdir -p "$KEYSTORE_DIR"
          
          # Use secrets if available; otherwise generate a new release keystore for this run
          if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ] && [ -n "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then
            echo "Setting up release keystore from secrets..."
            echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > "$KEYSTORE_DIR/release-key.jks"
            KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}"
            [ -z "$KEY_ALIAS" ] && KEY_ALIAS="my-alias"
            KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"
            [ -z "$KEY_PASSWORD" ] && KEY_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            STORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
            echo "✅ Release keystore configured from secrets"
          else
            echo "No release keystore secrets; generating a new keystore for this build..."
            STORE_PASSWORD="release-ci-${{ github.run_id }}-${{ github.run_attempt }}"
            KEY_ALIAS="release"
            keytool -genkey -v -keystore "$KEYSTORE_DIR/release-key.jks" \
              -storepass "$STORE_PASSWORD" -alias "$KEY_ALIAS" -keypass "$STORE_PASSWORD" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=ToDo,O=Roboticela,C=US"
            KEY_PASSWORD="$STORE_PASSWORD"
            echo "✅ Release keystore generated (APK will be signed and installable)"
          fi
          
          echo "ANDROID_KEYSTORE_PATH=$KEYSTORE_DIR/release-key.jks" >> $GITHUB_ENV
          echo "ANDROID_KEYSTORE_PASSWORD=$STORE_PASSWORD" >> $GITHUB_ENV
          echo "ANDROID_KEY_ALIAS=$KEY_ALIAS" >> $GITHUB_ENV
          echo "ANDROID_KEY_PASSWORD=$KEY_PASSWORD" >> $GITHUB_ENV

      - name: Create Android debug keystore (for Android builds)
        if: contains(matrix.platform, 'android')
        run: |
          # Create .android directory if it doesn't exist
          mkdir -p "$HOME/.android"
          
          # Check if debug keystore already exists
          if [ ! -f "$HOME/.android/debug.keystore" ]; then
            echo "Creating debug keystore for Android signing..."
            # Generate debug keystore with default password
            keytool -genkey -v -keystore "$HOME/.android/debug.keystore" \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" || true
          else
            echo "Debug keystore already exists"
          fi

      - name: Setup iOS (for iOS builds)
        if: contains(matrix.platform, 'ios')
        run: |
          # Accept Xcode license
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer
          sudo xcodebuild -license accept || true
          # Install iOS dependencies
          # Tauri iOS uses simplified target names (aarch64, aarch64-sim, x86_64)
          # but Rust still needs full target names for compilation
          rustup target add aarch64-apple-ios || true
          rustup target add aarch64-apple-ios-sim || true
          rustup target add x86_64-apple-ios || echo "x86_64-apple-ios target may not be available"

      - name: Install dependencies
        run: npm ci

      - name: Extract version from tag or use workflow input
        id: tag_version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION=${{ github.event.inputs.version }}
          else
            # Extract version from tauri.conf.json as fallback
            VERSION=$(grep -o '"version": "[^"]*"' src-tauri/tauri.conf.json | cut -d'"' -f4)
            if [ -z "$VERSION" ]; then
              VERSION="test-$(date +%Y%m%d-%H%M%S)"
            fi
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Initialize iOS project (before build, for iOS builds)
        if: contains(matrix.platform, 'ios')
        run: |
          # Ensure iOS project is initialized before building
          if [ ! -d "src-tauri/gen/apple" ] && [ ! -d "src-tauri/gen/ios" ]; then
            echo "Initializing iOS project before build..."
            npm run tauri ios init || echo "Warning: iOS init failed"
          fi

      - name: Initialize Android project (before build, for Android builds)
        if: contains(matrix.platform, 'android')
        run: |
          # Ensure Android project is initialized before building (gen/android not in repo)
          if [ ! -d "src-tauri/gen/android" ]; then
            echo "Initializing Android project before build..."
            CI=true npm run tauri android init
          fi

      - name: Configure Android release signing (for Android builds)
        if: contains(matrix.platform, 'android')
        run: |
          # Tauri expects keystore.properties in gen/android for release signing.
          # Without this, release APKs are unsigned and will not install.
          if [ -n "${ANDROID_KEYSTORE_PATH:-}" ] && [ -d "src-tauri/gen/android" ]; then
            KEY_ALIAS="${ANDROID_KEY_ALIAS:-my-alias}"
            KEY_PASS="${ANDROID_KEY_PASSWORD:-$ANDROID_KEYSTORE_PASSWORD}"
            {
              echo "storeFile=$ANDROID_KEYSTORE_PATH"
              echo "keyAlias=$KEY_ALIAS"
              echo "password=$ANDROID_KEYSTORE_PASSWORD"
            } > src-tauri/gen/android/keystore.properties
            echo "Wrote keystore.properties for release signing"
            # Ensure Gradle uses it: add signing config to app/build.gradle.kts if missing
            GRADLE_APP="src-tauri/gen/android/app/build.gradle.kts"
            if [ -f "$GRADLE_APP" ] && ! grep -q "signingConfigs.getByName" "$GRADLE_APP"; then
              python3 << 'PY'
          import re
          path = "src-tauri/gen/android/app/build.gradle.kts"
          with open(path) as f:
              content = f.read()
          if "signingConfigs.getByName" in content:
              print("Signing config already present")
              exit(0)
          # Add import at top so Properties resolves (Gradle "java" extension shadows java.util)
          if "import java.util.Properties" not in content:
              content = "import java.util.Properties\n\n" + content
          # Use File.inputStream() (Kotlin stdlib) so we don't need FileInputStream in scope
          signing_block = '''
            signingConfigs {
              create("release") {
                val keystorePropertiesFile = rootProject.file("keystore.properties")
                val keystoreProperties = Properties()
                if (keystorePropertiesFile.exists()) {
                  keystorePropertiesFile.inputStream().use { keystoreProperties.load(it) }
                }
                keyAlias = keystoreProperties.getProperty("keyAlias")!!
                keyPassword = keystoreProperties.getProperty("password")!!
                storeFile = file(keystoreProperties.getProperty("storeFile")!!)
                storePassword = keystoreProperties.getProperty("password")!!
              }
            }
            '''
          content = content.replace("buildTypes {", signing_block + "buildTypes {", 1)
          content = re.sub(
              r'(getByName\("release"\)\s*\{\s*)',
              r'\1\n        signingConfig = signingConfigs.getByName("release")\n      ',
              content,
              count=1
          )
          with open(path, "w") as f:
              f.write(content)
          print("Patched build.gradle.kts for release signing")
          PY
            fi
          else
            echo "Release keystore not set or gen/android missing; release APK may be unsigned (install can fail)."
          fi

      - name: Configure iOS code signing (for iOS builds)
        if: contains(matrix.platform, 'ios')
        run: |
          # For simulator builds, use ad-hoc signing (no team required)
          # Find the Xcode project file and modify it
          XCODE_PROJ=$(find src-tauri/gen/apple -name "*.xcodeproj" -type d 2>/dev/null | head -1)
          if [ -z "$XCODE_PROJ" ]; then
            echo "Warning: Xcode project not found, skipping code signing configuration"
            exit 0
          fi
          
          PROJECT_FILE="$XCODE_PROJ/project.pbxproj"
          if [ ! -f "$PROJECT_FILE" ]; then
            echo "Warning: project.pbxproj not found at $PROJECT_FILE"
            exit 0
          fi
          
          # For simulator builds, disable code signing requirements
          if [[ "${{ matrix.platform }}" == *"simulator"* ]]; then
            echo "Configuring ad-hoc code signing for simulator build..."
            # Use sed to replace code signing settings
            # Replace CODE_SIGN_IDENTITY = "" with CODE_SIGN_IDENTITY = "-"
            sed -i '' 's/CODE_SIGN_IDENTITY = "";/CODE_SIGN_IDENTITY = "-";/g' "$PROJECT_FILE" || true
            # Replace CODE_SIGNING_REQUIRED = YES with CODE_SIGNING_REQUIRED = NO
            sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' "$PROJECT_FILE" || true
            # Remove DEVELOPMENT_TEAM requirement by setting it to empty
            sed -i '' 's/DEVELOPMENT_TEAM = "[^"]*";/DEVELOPMENT_TEAM = "";/g' "$PROJECT_FILE" || true
            echo "Configured simulator build for ad-hoc signing"
          else
            # For device builds, try to use team from environment or disable signing
            if [ -n "$APPLE_DEVELOPMENT_TEAM" ]; then
              echo "Using development team: $APPLE_DEVELOPMENT_TEAM"
              sed -i '' "s/DEVELOPMENT_TEAM = \"[^\"]*\";/DEVELOPMENT_TEAM = \"$APPLE_DEVELOPMENT_TEAM\";/g" "$PROJECT_FILE" || true
            else
              echo "Warning: No APPLE_DEVELOPMENT_TEAM set, using ad-hoc signing"
              sed -i '' 's/CODE_SIGN_IDENTITY = "";/CODE_SIGN_IDENTITY = "-";/g' "$PROJECT_FILE" || true
              sed -i '' 's/CODE_SIGNING_REQUIRED = YES;/CODE_SIGNING_REQUIRED = NO;/g' "$PROJECT_FILE" || true
            fi
          fi

      - name: Build Vite app
        run: npm run build

      - name: Verify build artifacts exist
        shell: bash
        run: |
          echo "Verifying frontend build..."
          if [ ! -d "dist" ]; then
            echo "Error: dist directory not found!"
            exit 1
          fi
          echo "dist directory exists with $(find dist -type f | wc -l) files"
          ls -la dist/ | head -10
          
          echo "Verifying required files..."
          if [ ! -f "LICENSE" ]; then
            echo "Error: LICENSE file not found in project root!"
            exit 1
          fi
          echo "✓ LICENSE found"
          
          if [ ! -f "src-tauri/icons/icon.ico" ]; then
            echo "Error: icon.ico not found!"
            exit 1
          fi
          echo "✓ icon.ico found"
          
          # Verify dist/index.html exists
          if [ ! -f "dist/index.html" ]; then
            echo "Error: dist/index.html not found!"
            exit 1
          fi
          echo "✓ dist/index.html found"
          
          echo "All required files verified"

      - name: Prepare files for Windows build
        if: runner.os == 'Windows'
        shell: bash
        run: |
          # Copy LICENSE to src-tauri for NSIS bundler
          # NSIS may need the file in a location relative to where it runs
          if [ -f "LICENSE" ]; then
            cp LICENSE src-tauri/LICENSE
            echo "✓ Copied LICENSE to src-tauri directory"
          fi
          
          # Verify paths are accessible
          echo "Checking file accessibility from src-tauri:"
          if [ -f "src-tauri/LICENSE" ]; then
            echo "✓ src-tauri/LICENSE exists"
          fi
          if [ -f "src-tauri/icons/icon.ico" ]; then
            echo "✓ src-tauri/icons/icon.ico exists"
          fi
          if [ -d "../dist" ] || [ -d "src-tauri/../dist" ]; then
            echo "✓ dist directory accessible"
          fi

      - name: Prepare macOS environment
        if: runner.os == 'macOS'
        shell: bash
        run: |
          # Ensure create-dmg and other tools are in PATH
          export PATH="/usr/local/bin:/opt/homebrew/bin:$PATH"
          echo "PATH: $PATH"
          
          # Verify create-dmg is accessible
          if command -v create-dmg &> /dev/null; then
            echo "✓ create-dmg found: $(which create-dmg)"
            create-dmg --version || true
          else
            echo "⚠ create-dmg not found, trying to install..."
            brew install create-dmg || true
          fi
          
          # Ensure scripts will have execute permissions
          # Set umask to allow execute permissions
          umask 022
          
          # Pre-create DMG bundle directory and ensure permissions
          # This helps avoid permission issues during build
          mkdir -p src-tauri/target/x86_64-apple-darwin/release/bundle/dmg || true
          mkdir -p src-tauri/target/aarch64-apple-darwin/release/bundle/dmg || true
          
          # Ensure any existing bundle_dmg.sh scripts have execute permissions
          find src-tauri/target -name "bundle_dmg.sh" -exec chmod +x {} \; 2>/dev/null || true
          echo "Current umask: $(umask)"

      - name: Write Windows bundle config
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo '{"bundle":{"targets":"${{ matrix.bundle-target }}"}}' > src-tauri/tauri.windows-bundle.json
          cat src-tauri/tauri.windows-bundle.json

      - name: Build platform-specific artifact
        shell: bash
        run: |
          # CRITICAL: Set PATH first before any commands
          export PATH="/usr/bin:/bin:/usr/local/bin:/opt/homebrew/bin:${PATH}"
          
          # For macOS, ensure PATH includes homebrew early
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export PATH="/usr/local/bin:/opt/homebrew/bin:/usr/bin:/bin:${PATH}"
            # Ensure create-dmg is in PATH for DMG builds
            if [[ "${{ matrix.platform }}" == *"macos"* ]] && [[ "${{ matrix.build-command }}" == *"dmg"* ]]; then
              echo "Setting up environment for DMG build..."
              export PATH="/usr/local/bin:/opt/homebrew/bin:${PATH}"
              # Verify create-dmg is available
              if ! command -v create-dmg &> /dev/null; then
                echo "Warning: create-dmg not found, attempting to install..."
                brew install create-dmg || true
              fi
              which create-dmg || echo "create-dmg still not found"
              create-dmg --version || echo "create-dmg version check failed"
            fi
          fi
          
          set -e
          
          echo "Building for ${{ matrix.platform }}..."
          echo "Working directory: $(pwd)"
          echo "PATH: ${PATH}"
          echo "Contents of dist:"
          ls -la dist/ | head -5 || true
          echo "Running: ${{ matrix.build-command }}"
          
          # For iOS simulator builds, set code signing environment variables
          if [[ "${{ matrix.platform }}" == *"ios"* ]] && [[ "${{ matrix.platform }}" == *"simulator"* ]]; then
            echo "Setting code signing environment for iOS simulator build..."
            export CODE_SIGN_IDENTITY="-"
            export CODE_SIGNING_REQUIRED=NO
            export CODE_SIGNING_ALLOWED=NO
          elif [[ "${{ matrix.platform }}" == *"ios"* ]]; then
            # For device builds, use team if available, otherwise ad-hoc
            if [ -n "$APPLE_DEVELOPMENT_TEAM" ]; then
              echo "Using development team for iOS device build: $APPLE_DEVELOPMENT_TEAM"
              export APPLE_DEVELOPMENT_TEAM
            else
              echo "No development team set, using ad-hoc signing for iOS device build"
              export CODE_SIGN_IDENTITY="-"
              export CODE_SIGNING_REQUIRED=NO
            fi
          fi
          
          # Verify create-dmg for macOS
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            which create-dmg || echo "Warning: create-dmg not in PATH"
          fi
          
          ${{ matrix.build-command }} 2>&1 | tee build.log || {
            echo "Build failed. Checking for common issues..."
            
            # For macOS, check if bundle_dmg.sh exists and has permissions
            if [[ "${{ runner.os }}" == "macOS" ]]; then
              echo "Checking for DMG bundling scripts:"
              find src-tauri/target -name "bundle_dmg.sh" -exec ls -la {} \; 2>/dev/null || true
              # Try to fix permissions and retry if script exists
              find src-tauri/target -name "bundle_dmg.sh" -exec chmod +x {} \; 2>/dev/null || true
              echo "Checking create-dmg availability:"
              which create-dmg || echo "create-dmg not found"
              create-dmg --version || echo "create-dmg version check failed"
              echo "Checking bundle directory permissions:"
              find src-tauri/target -path "*/bundle/dmg" -type d -exec ls -ld {} \; 2>/dev/null || true
              echo "Checking if bundle_dmg.sh can be executed:"
              find src-tauri/target -name "bundle_dmg.sh" -exec sh -c 'echo "Testing: {}"; head -5 "{}" || true' \; 2>/dev/null || true
            fi
            
            # For Windows, check NSIS issues
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              echo "NSIS might be looking for files. Checking bundle directory:"
              find src-tauri/target -path "*/bundle/*" -type f 2>/dev/null | head -10 || true
              echo "Checking if dist directory is accessible from src-tauri:"
              ls -la src-tauri/../dist/ 2>/dev/null || echo "Cannot access dist from src-tauri"
            fi
            
            cat build.log || true
            exit 1
          }
        continue-on-error: false

      - name: Find and rename artifact
        id: find_artifact
        shell: bash
        run: |
          VERSION="${{ steps.tag_version.outputs.version }}"
          ARTIFACT_NAME="${{ matrix.artifact-name }}"
          EXT="${ARTIFACT_NAME##*.}"
          
          # Construct the search directory
          SEARCH_DIR=$(dirname "${{ matrix.artifact-path }}")
          
          echo "Searching for artifact in: $SEARCH_DIR"
          echo "Looking for files with extension: .$EXT"
          
          # Check if we're looking for a .app bundle (directory) for iOS simulator
          if [[ "$EXT" == "app" ]]; then
            # .app bundles are directories, not files
            if [ -d "$SEARCH_DIR" ]; then
              # First, try to find .app directories in the specific directory
              ARTIFACT=$(find "$SEARCH_DIR" -maxdepth 2 -type d -name "*.app" 2>/dev/null | head -n 1)
              if [ -z "$ARTIFACT" ]; then
                # Try searching in subdirectories
                ARTIFACT=$(find "$SEARCH_DIR" -type d -name "*.app" 2>/dev/null | head -n 1)
              fi
            fi
            
            # Fallback: search in gen/apple and gen/ios for iOS
            if [ -z "$ARTIFACT" ] && [[ "${{ matrix.platform }}" == *"ios"* ]]; then
              echo "Not found in $SEARCH_DIR, searching in gen/apple and gen/ios..."
              ARTIFACT=$(find src-tauri/gen/apple -type d -name "*.app" 2>/dev/null | head -n 1)
              if [ -z "$ARTIFACT" ]; then
                ARTIFACT=$(find src-tauri/gen/ios -type d -name "*.app" 2>/dev/null | head -n 1)
              fi
            fi
          else
            # Find the artifact file by extension in the bundle directory
            # Tauri may generate files with spaces or different naming, so search by extension
            if [ -d "$SEARCH_DIR" ]; then
              # First, try to find by extension in the specific directory
              ARTIFACT=$(find "$SEARCH_DIR" -maxdepth 1 -type f -name "*.$EXT" 2>/dev/null | grep -v ".sha256" | grep -v ".sha512" | head -n 1)
              if [ -z "$ARTIFACT" ]; then
                # Try searching in subdirectories (some bundles create subdirs)
                ARTIFACT=$(find "$SEARCH_DIR" -type f -name "*.$EXT" 2>/dev/null | grep -v ".sha256" | grep -v ".sha512" | head -n 1)
              fi
            fi
            
            # Fallback: search in all target directories
            if [ -z "$ARTIFACT" ]; then
              echo "Not found in $SEARCH_DIR, searching in all target directories..."
              # For Android, search in gen/android
              if [[ "${{ matrix.platform }}" == *"android"* ]]; then
                ARTIFACT=$(find src-tauri/gen/android -type f -name "*.$EXT" 2>/dev/null | grep -v ".sha256" | grep -v ".sha512" | head -n 1)
              # For iOS, search in gen/apple and gen/ios
              elif [[ "${{ matrix.platform }}" == *"ios"* ]]; then
                ARTIFACT=$(find src-tauri/gen/apple -type f -name "*.$EXT" 2>/dev/null | grep -v ".sha256" | grep -v ".sha512" | head -n 1)
                if [ -z "$ARTIFACT" ]; then
                  ARTIFACT=$(find src-tauri/gen/ios -type f -name "*.$EXT" 2>/dev/null | grep -v ".sha256" | grep -v ".sha512" | head -n 1)
                fi
              else
                # For desktop platforms, search in target directories
                ARTIFACT=$(find src-tauri/target -type f -name "*.$EXT" 2>/dev/null | grep -v ".sha256" | grep -v ".sha512" | grep -i "bundle" | head -n 1)
              fi
            fi
          fi
          
          if [ -z "$ARTIFACT" ]; then
            echo "Error: Artifact not found with extension .$EXT"
            echo "Contents of $SEARCH_DIR:"
            ls -la "$SEARCH_DIR" 2>/dev/null || true
            echo "Searching in all bundle directories:"
            find src-tauri/target -path "*/bundle/*" -type f \( -name "*.$EXT" -o -name "*.exe" -o -name "*.msi" -o -name "*.AppImage" -o -name "*.deb" -o -name "*.rpm" -o -name "*.dmg" -o -name "*.tar.gz" \) 2>/dev/null | head -10 || true
            # Also check Android and iOS directories
            find src-tauri/gen/android -type f -name "*.apk" 2>/dev/null | head -5 || true
            find src-tauri/gen/apple -type d -name "*.app" 2>/dev/null | head -5 || true
            find src-tauri/gen/ios -type f \( -name "*.ipa" -o -name "*.app" \) -o -type d -name "*.app" 2>/dev/null | head -5 || true
            exit 1
          fi
          
          echo "Found artifact: $ARTIFACT"
          
          # Create versioned filename: ToDo-platform-version.ext
          ORIGINAL_BASE=$(basename "$ARTIFACT")
          
          # Extract version from filename if present, otherwise use our version
          if echo "$ORIGINAL_BASE" | grep -qE "_[0-9]+\.[0-9]+\.[0-9]+"; then
            # Extract version number from filename
            VERSION_IN_FILE=$(echo "$ORIGINAL_BASE" | grep -oE "_[0-9]+\.[0-9]+\.[0-9]+" | head -1 | sed 's/_//')
            FINAL_VERSION="${VERSION:-$VERSION_IN_FILE}"
          else
            FINAL_VERSION="$VERSION"
          fi
          
          # Create new name: ToDo-platform-version.ext
          FINAL_NAME="ToDo-${{ matrix.platform }}-$FINAL_VERSION.$EXT"
          
          # Copy artifact with versioned name
          # For .app bundles (directories), use cp -R; for files, use cp
          if [ -d "$ARTIFACT" ]; then
            cp -R "$ARTIFACT" "$FINAL_NAME"
            echo "Copied artifact directory: $ARTIFACT -> $FINAL_NAME"
          else
            cp "$ARTIFACT" "$FINAL_NAME"
            echo "Copied artifact file: $ARTIFACT -> $FINAL_NAME"
          fi
          
          # Set output for use in checksum step
          echo "artifact_file=$FINAL_NAME" >> $GITHUB_OUTPUT

      - name: Generate checksums
        id: checksums
        shell: bash
        run: |
          ARTIFACT_FILE="${{ steps.find_artifact.outputs.artifact_file }}"
          if [ -z "$ARTIFACT_FILE" ]; then
            # Fallback to matrix name if output not set
            ARTIFACT_FILE="${{ matrix.artifact-name }}"
          fi
          
          # For .app bundles (directories), create a zip archive first for checksums
          ORIGINAL_ARTIFACT="$ARTIFACT_FILE"
          if [ -d "$ARTIFACT_FILE" ]; then
            echo "Creating archive for .app bundle: $ARTIFACT_FILE"
            ARCHIVE_NAME="${ARTIFACT_FILE%.app}.zip"
            cd "$(dirname "$ARTIFACT_FILE")"
            zip -r "$ARCHIVE_NAME" "$(basename "$ARTIFACT_FILE")" > /dev/null
            echo "Created archive: $ARCHIVE_NAME"
            # Remove the .app directory since we only want the zip
            rm -rf "$ORIGINAL_ARTIFACT"
            echo "Removed .app directory, keeping only zip archive"
            # Update ARTIFACT_FILE to point to the zip
            ARTIFACT_FILE="$ARCHIVE_NAME"
            # Update the artifact_file output to point to the zip
            echo "artifact_file=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
            # Output archive name for reference (same as artifact_file now)
            echo "archive_file=$ARCHIVE_NAME" >> $GITHUB_OUTPUT
          fi
          
          if [ -f "$ARTIFACT_FILE" ]; then
            if [[ "${{ runner.os }}" == "Windows" ]]; then
              # Windows certutil format - extract hash and format as filename hash
              SHA256=$(certutil -hashfile "$ARTIFACT_FILE" SHA256 | grep -v "^SHA256" | grep -v "^CertUtil" | tr -d ' \r\n')
              echo "$SHA256  $ARTIFACT_FILE" > "$ARTIFACT_FILE.sha256"
              SHA512=$(certutil -hashfile "$ARTIFACT_FILE" SHA512 | grep -v "^SHA512" | grep -v "^CertUtil" | tr -d ' \r\n')
              echo "$SHA512  $ARTIFACT_FILE" > "$ARTIFACT_FILE.sha512"
            else
              sha256sum "$ARTIFACT_FILE" > "$ARTIFACT_FILE.sha256"
              sha512sum "$ARTIFACT_FILE" > "$ARTIFACT_FILE.sha512"
            fi
            echo "Generated checksums for $ARTIFACT_FILE"
          else
            echo "Warning: Artifact $ARTIFACT_FILE not found for checksum generation"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}
          path: |
            ${{ steps.checksums.outputs.artifact_file || steps.find_artifact.outputs.artifact_file }}
            ${{ steps.checksums.outputs.artifact_file || steps.find_artifact.outputs.artifact_file }}.sha256
            ${{ steps.checksums.outputs.artifact_file || steps.find_artifact.outputs.artifact_file }}.sha512
          if-no-files-found: warn
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Clean up artifacts directory
        shell: bash
        run: |
          cd artifacts
          echo "Contents before cleanup:"
          find . -type f -o -type d | head -20 || true
          
          # Remove any .app directories that might have been extracted
          find . -type d -name "*.app" -exec rm -rf {} + 2>/dev/null || true
          
          # Remove any individual files that shouldn't be in releases
          # iOS/macOS bundle contents
          find . -type f \( \
            -name "*.nib" \
            -o -name "Info.plist" \
            -o -name "PkgInfo" \
            -o -name "CodeResources" \
            -o -name "Assets.car" \
            -o -name "AppIcon*.png" \
            -o -name "AppIcon*.ipad.png" \
            -o -name "Restaurant Management System" \
            -o -name "*.app/Contents/*" \
          \) -delete 2>/dev/null || true
          
          # Remove any nested directories that might contain bundle contents
          find . -type d -name "Contents" -exec rm -rf {} + 2>/dev/null || true
          find . -type d -name "Resources" -exec rm -rf {} + 2>/dev/null || true
          
          echo "Contents after cleanup:"
          find . -type f | head -20 || true
          echo "Cleaned up artifacts directory"

      - name: Generate combined checksums
        shell: bash
        run: |
          cd artifacts
          echo "# SHA256 Checksums" > checksums-sha256.txt
          echo "# Generated on $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> checksums-sha256.txt
          echo "" >> checksums-sha256.txt
          
          echo "# SHA512 Checksums" > checksums-sha512.txt
          echo "# Generated on $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> checksums-sha512.txt
          echo "" >> checksums-sha512.txt
          
          # Only include actual artifact files, explicitly exclude unwanted files
          find . -type f \( \
            -name "*.exe" \
            -o -name "*.msi" \
            -o -name "*.AppImage" \
            -o -name "*.deb" \
            -o -name "*.rpm" \
            -o -name "*.dmg" \
            -o -name "*.tar.gz" \
            -o -name "*.apk" \
            -o -name "*.ipa" \
            -o -name "*.zip" \
            -o -name "*.gz" \
          \) ! -name "*.sha*" \
          ! -name "*.nib" \
          ! -name "Info.plist" \
          ! -name "PkgInfo" \
          ! -name "CodeResources" \
          ! -name "Assets.car" \
          ! -name "AppIcon*.png" \
          ! -name "Restaurant Management System" \
          ! -path "*/Contents/*" \
          ! -path "*/Resources/*" \
          ! -path "*/*.app/*" \
          | while read file; do
            filename=$(basename "$file")
            dirname=$(dirname "$file" | sed 's|^\./||')
            if [ "$dirname" != "." ]; then
              relative_path="${dirname}/${filename}"
            else
              relative_path="$filename"
            fi
            sha256sum "$file" | sed "s|  ./|  |" >> checksums-sha256.txt
            sha512sum "$file" | sed "s|  ./|  |" >> checksums-sha512.txt
          done

      - name: Extract version from tag or use workflow input
        id: tag_version
        run: |
          if [ "${{ github.event_name }}" == "push" ] && [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          elif [ "${{ github.event.inputs.version }}" != "" ]; then
            VERSION=${{ github.event.inputs.version }}
          else
            VERSION="test-$(date +%Y%m%d-%H%M%S)"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Prepare clean release directory
        shell: bash
        run: |
          mkdir -p release-artifacts
          cd artifacts
          
          echo "Copying valid artifacts to clean directory..."
          
          # Copy only valid artifact files to a clean directory
          # Use a while loop to handle filenames with spaces correctly
          find . -type f \( \
            -name "*.exe" \
            -o -name "*.msi" \
            -o -name "*.AppImage" \
            -o -name "*.deb" \
            -o -name "*.rpm" \
            -o -name "*.dmg" \
            -o -name "*.tar.gz" \
            -o -name "*.apk" \
            -o -name "*.ipa" \
            -o -name "*.zip" \
            -o -name "*.gz" \
            -o -name "*.sha256" \
            -o -name "*.sha512" \
            -o -name "checksums-*.txt" \
          \) ! -name "*.nib" \
          ! -name "Info.plist" \
          ! -name "PkgInfo" \
          ! -name "CodeResources" \
          ! -name "Assets.car" \
          ! -name "AppIcon*.png" \
          ! -name "AppIcon*.ipad.png" \
          ! -name "Restaurant Management System" \
          ! -path "*/Contents/*" \
          ! -path "*/Resources/*" \
          ! -path "*/*.app/*" \
          | while IFS= read -r file; do
            # Get just the filename
            filename=$(basename "$file")
            # Copy to release-artifacts, flattening the structure
            cp "$file" "../release-artifacts/$filename"
          done
          
          cd ../release-artifacts
          echo "Files in clean release directory:"
          ls -lah | head -30 || true
          
          # Verify no unwanted files
          if find . -type f \( -name "*.nib" -o -name "Info.plist" -o -name "PkgInfo" -o -name "CodeResources" -o -name "Assets.car" -o -name "AppIcon*.png" \) 2>/dev/null | grep -q .; then
            echo "ERROR: Found unwanted files in release directory!"
            find . -type f \( -name "*.nib" -o -name "Info.plist" -o -name "PkgInfo" -o -name "CodeResources" -o -name "Assets.car" -o -name "AppIcon*.png" \)
            exit 1
          fi
          
          echo "Clean directory verified - only valid artifacts present"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.tag_version.outputs.version }}
          files: |
            release-artifacts/**/*
          draft: ${{ github.event.inputs.draft || (github.event_name == 'workflow_dispatch' && !github.event.inputs.version) }}
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🚀 Release v${{ steps.tag_version.outputs.version }}
            
            ### 📦 Downloads
            
            This release includes builds for all supported platforms:
            
            #### 🪟 Windows
            - **EXE Installer (x64)**: `ToDo-setup.exe`
            - **MSI Installer (x64)**: `ToDo-setup.msi`
            - **EXE Installer (ARM64)**: `ToDo-setup-arm64.exe` (ARM-based Windows)
            - **EXE Installer (x86)**: `ToDo-setup-x86.exe` (32-bit legacy)
            
            #### 🐧 Linux
            - **AppImage (x64)**: `ToDo.AppImage`
            - **DEB Package (x64)**: `ToDo.deb`
            - **RPM Package (x64)**: `ToDo.rpm`
            
            #### 🍎 macOS
            - **DMG (Intel)**: `ToDo.dmg` (x64)
            - **DMG (Apple Silicon)**: `ToDo-arm64.dmg` (ARM64)
            - **DMG (Universal)**: `ToDo-universal.dmg` (Intel + Apple Silicon)
            - **App Bundle (Intel)**: `ToDo.app.tar.gz`
            - **App Bundle (Apple Silicon)**: `ToDo-arm64.app.tar.gz`
            
            #### 📱 Android
            - **APK (ARM64)**: `ToDo-aarch64.apk` (64-bit ARM devices)
            - **APK (ARMv7)**: `ToDo-armv7.apk` (32-bit ARM devices)
            - **APK (x86_64)**: `ToDo-x86_64.apk` (64-bit x86 emulators)
            - **APK (i686)**: `ToDo-i686.apk` (32-bit x86 emulators)
            
            #### 🍎 iOS
            # - **IPA (Device)**: `ToDo.ipa` (Physical devices) - Commented out
            - **Simulator (Apple Silicon)**: `ToDo-simulator.app` (M1/M2/M3 simulators)
            - **Simulator (Intel)**: `ToDo-simulator-x86_64.app` (Intel Mac simulators)
            
            ### 🔐 Checksums
            
            SHA256 and SHA512 checksums are provided for all artifacts. You can verify downloads using:
            
            ```bash
            # Verify SHA256
            sha256sum -c checksums-sha256.txt
            
            # Verify SHA512
            sha512sum -c checksums-sha512.txt
            ```
            
            ### 📝 Notes
            
            - All checksums are included in this release
            - Each artifact has individual `.sha256` and `.sha512` files
            - Combined checksum files are available for batch verification
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

