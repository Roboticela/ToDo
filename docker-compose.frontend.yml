# Frontend (nginx) only. No .env file: set env vars in Dokploy (or host).
# Build arg VITE_API_URL is required (see .env.example). Run from repo root:
#   docker compose -f docker-compose.frontend.yml up -d

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    ports:
      - "80:80"
    restart: unless-stopped
